appId: dev.praxis.app
productName: Praxis
directories:
  buildResources: resources
  output: release
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml}'
  - '!{CHANGELOG.md,README.md}'
mac:
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal
  artifactName: ${name}-${version}-${arch}.${ext}
win:
  target:
    - nsis
  artifactName: ${name}-${version}-setup.${ext}
linux:
  target:
    - AppImage
    - deb
  category: Education
  artifactName: ${name}-${version}-${arch}.${ext}
publish:
  provider: github
  owner: ttiimmaahh
  repo: praxis
  releaseType: draft
